name: Release Candidate Validation

on:
  workflow_dispatch:
    inputs:
      candidate_label:
        description: "Human-readable candidate label (for logs/artifacts)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-rc:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch RC validation
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "RC validation must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-quicktask-workspace
        with:
          pnpm_version: "10.0.0"
          node_version: "22"
          run_package_manager_check: "true"

      - name: Workspace checks
        run: pnpm check

      - name: Workspace tests
        run: pnpm test

      - name: Workspace build
        run: pnpm build

      - name: Validate pending changeset structure
        run: pnpm release:validate-changesets

      - name: Validate release workflow contracts
        run: |
          pnpm workspace-kit:phase6:consumer-check
          pnpm release:check-workflow-contracts
          pnpm docs:check-links
          pnpm check:command-entrypoints

      - name: Validate support-matrix consistency
        run: pnpm check:support-matrix

      - name: Validate package compliance metadata
        run: |
          pnpm check:package-compliance
          pnpm check:generated-artifacts

      - name: Generate release notes snapshot
        run: pnpm release:notes

      - name: Validate release note quality
        run: pnpm release:check-notes-quality

      - name: Build candidate artifacts
        run: pnpm package:release

      - name: Verify candidate artifacts
        run: pnpm release:verify-local-artifacts

      - name: Run clean-room artifact user journeys
        run: pnpm release:test-artifact-journeys

      - name: Validate host install harness
        run: pnpm release:validate-host-installs

      - name: Upload candidate assets
        uses: actions/upload-artifact@v5
        with:
          name: rc-assets-${{ inputs.candidate_label }}
          path: |
            artifacts/*.vsix
            artifacts/*.tgz
            artifacts/checksums.txt
            artifacts/release-integrity-metadata.json
            artifacts/sbom.json
            artifacts/release-notes.md
          if-no-files-found: error

      - name: RC validation summary
        run: |
          echo "RC validation completed for label: ${{ inputs.candidate_label }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Workflow run ID: ${{ github.run_id }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Use this run ID as rc_run_id when dispatching Release." >> "${GITHUB_STEP_SUMMARY}"
