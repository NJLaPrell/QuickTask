name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workspace typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Workspace tests
        run: pnpm test

      - name: Workspace build
        run: pnpm build

      - name: Validate changeset note format
        run: pnpm release:validate-changesets

      - name: Validate task tracker schema
        run: pnpm tasks:check

      - name: Validate release workflow contracts
        run: pnpm release:check-workflow-contracts

      - name: Package VS Code extension (.vsix)
        run: pnpm package:vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicktask-vscode-vsix
          path: artifacts/*.vsix
          if-no-files-found: error

      - name: Package manager consistency
        run: pnpm check:package-manager

      - name: Host smoke tests
        run: pnpm test:smoke
