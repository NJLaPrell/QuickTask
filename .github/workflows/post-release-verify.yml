name: Post-Release Install Verification

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-release-assets:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p artifacts
          gh release download "${RELEASE_TAG}" --dir artifacts

      - name: Verify downloaded assets
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/verify-release-assets.mjs --assets-dir artifacts --version "${VERSION}"

      - name: Run clean-room artifact user journeys
        if: runner.os == 'Linux'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/run-artifact-user-journeys.mjs --assets-dir artifacts --version "${VERSION}"

      - name: Validate host install harness
        if: runner.os == 'Linux'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/host-install-validate.mjs --assets-dir artifacts --version "${VERSION}"

      - name: Publish verification summary
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "Verified installable assets for ${RELEASE_TAG} on ${{ matrix.os }}." >> "${GITHUB_STEP_SUMMARY}"
          echo "- VSIX and OpenClaw package naming matched release tag" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Checksum validation passed" >> "${GITHUB_STEP_SUMMARY}"
          echo "- OpenClaw install smoke check passed" >> "${GITHUB_STEP_SUMMARY}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "- Clean-room user journeys and host-install validation passed" >> "${GITHUB_STEP_SUMMARY}"
          fi
