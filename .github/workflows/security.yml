name: Security

on:
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect dependency graph availability
        id: dependency_graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS="$(gh api "repos/${{ github.repository }}" --jq '.security_and_analysis.dependency_graph.status // "unavailable"' || echo "unavailable")"
          if [ "${STATUS}" = "enabled" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"

      - name: Dependency review (PR dependency and lockfile changes)
        if: steps.dependency_graph.outputs.available == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency review fallback note
        if: steps.dependency_graph.outputs.available != 'true'
        run: |
          echo "Dependency review fallback: dependency graph unavailable (status=${{ steps.dependency_graph.outputs.status }})." >> "${GITHUB_STEP_SUMMARY}"
          echo "Security audit job remains required; dependency-review gate is skipped only for platform unavailability." >> "${GITHUB_STEP_SUMMARY}"

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies (high/critical fail)
        run: pnpm audit --prod --audit-level high
