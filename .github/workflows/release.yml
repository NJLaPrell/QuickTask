name: Release

on:
  workflow_dispatch:
    inputs:
      readme_status:
        description: "README sync status"
        required: true
        type: choice
        options:
          - updated
          - no-change
      docs_status:
        description: "docs/ sync status"
        required: true
        type: choice
        options:
          - updated
          - no-change
      docs_sync_notes:
        description: "Required if any status is no-change"
        required: false
        type: string
      rc_run_id:
        description: "Successful Release Candidate Validation run ID"
        required: true
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch releases
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Releases must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Verify RC validation run passed
        env:
          GH_TOKEN: ${{ github.token }}
          RC_RUN_ID: ${{ inputs.rc_run_id }}
        run: |
          RUN_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/${RC_RUN_ID}")
          RUN_NAME=$(echo "${RUN_JSON}" | jq -r '.name')
          RUN_STATUS=$(echo "${RUN_JSON}" | jq -r '.status')
          RUN_CONCLUSION=$(echo "${RUN_JSON}" | jq -r '.conclusion')
          RUN_HEAD_BRANCH=$(echo "${RUN_JSON}" | jq -r '.head_branch')

          if [ "${RUN_NAME}" != "Release Candidate Validation" ]; then
            echo "Expected RC workflow run name 'Release Candidate Validation', got '${RUN_NAME}'."
            exit 1
          fi

          if [ "${RUN_STATUS}" != "completed" ] || [ "${RUN_CONCLUSION}" != "success" ]; then
            echo "RC run ${RC_RUN_ID} must be completed with success."
            echo "Status=${RUN_STATUS}, conclusion=${RUN_CONCLUSION}"
            exit 1
          fi

          if [ "${RUN_HEAD_BRANCH}" != "main" ]; then
            echo "RC run ${RC_RUN_ID} must target main. Got '${RUN_HEAD_BRANCH}'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-quicktask-workspace
        with:
          pnpm_version: "10.0.0"
          node_version: "22"
          run_package_manager_check: "true"

      - name: Run checks
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate pending changeset structure
        run: pnpm release:validate-changesets

      - name: Validate release workflow contracts
        run: |
          pnpm workspace-kit:phase6:consumer-check
          pnpm release:check-workflow-contracts
          pnpm docs:check-links
          pnpm check:command-entrypoints

      - name: Validate support-matrix consistency
        run: pnpm check:support-matrix

      - name: Validate package compliance metadata
        run: |
          pnpm check:package-compliance
          pnpm check:generated-artifacts

      - name: Docs synchronization gate
        env:
          RELEASE_README_STATUS: ${{ inputs.readme_status }}
          RELEASE_DOCS_STATUS: ${{ inputs.docs_status }}
          RELEASE_DOCS_SYNC_NOTES: ${{ inputs.docs_sync_notes }}
        run: pnpm release:docs-check

      - name: Generate curated release notes
        run: pnpm release:notes

      - name: Validate release note quality
        run: pnpm release:check-notes-quality

      - name: Apply release versions and changelogs
        run: pnpm release:version

      - name: Detect release version
        id: detect_version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "release_version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Enforce release baseline version policy
        run: pnpm release:check-baseline

      - name: Fail when no release changes were produced
        run: |
          if git diff --quiet; then
            echo "No changeset-driven release changes were produced."
            echo "Make sure at least one .changeset entry is merged into main."
            exit 1
          fi

      - name: Build release assets and integrity metadata
        run: pnpm package:release

      - name: Verify built release assets
        run: pnpm release:verify-local-artifacts

      - name: Run clean-room artifact user journeys
        run: pnpm release:test-artifact-journeys

      - name: Validate host install harness
        run: pnpm release:validate-host-installs

      - name: Upload packaged release assets
        uses: actions/upload-artifact@v5
        with:
          name: release-assets-v${{ steps.detect_version.outputs.release_version }}
          path: |
            artifacts/*.vsix
            artifacts/*.tgz
            artifacts/checksums.txt
            artifacts/release-integrity-metadata.json
            artifacts/sbom.json
            artifacts/release-notes.md
          if-no-files-found: error

      - name: Commit release changes
        run: |
          git add -A
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore(release): v${{ steps.detect_version.outputs.release_version }}"

      - name: Push release commit
        run: git push origin HEAD:main

      - name: Create and push release tag
        run: |
          git tag "v${{ steps.detect_version.outputs.release_version }}"
          git push origin "v${{ steps.detect_version.outputs.release_version }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ steps.detect_version.outputs.release_version }}
        run: |
          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --notes-file artifacts/release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              artifacts/*.vsix \
              artifacts/*.tgz \
              artifacts/checksums.txt \
              artifacts/release-integrity-metadata.json \
              artifacts/sbom.json \
              --notes-file artifacts/release-notes.md \
              --generate-notes
          fi
