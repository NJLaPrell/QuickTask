name: Setup QuickTask workspace
description: Setup pnpm/node, install dependencies, and optionally validate package manager policy
inputs:
  pnpm_version:
    description: pnpm version to install
    required: false
    default: "10.0.0"
  node_version:
    description: Node.js version to use
    required: false
    default: "22"
  run_package_manager_check:
    description: Whether to run pnpm check:package-manager
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm_version }}

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node_version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Package manager consistency
      if: ${{ inputs.run_package_manager_check == 'true' }}
      shell: bash
      run: pnpm check:package-manager
